<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">הדשבורד של ערן</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    /* ══════════════════════════════════════════════════════
       THEME CSS VARIABLES
       כל הצבעים בעמוד נגזרים ממשתנים אלו בלבד
    ══════════════════════════════════════════════════════ */
    :root {
      /* accent */
      --accent:         #facc15;
      --accent-dim:     rgba(250,204,21,0.13);
      --accent-border:  rgba(250,204,21,0.28);

      /* ── App background (used by body + transition) ── */
      --app-bg:         #080810;
      --bg-grad-a:      #1a1040;
      --bg-grad-b:      #0f2040;

      /* ── Tile background (theme default, overridable per-tile) ── */
      --tile-bg:        #1a1a2e;

      /* surfaces */
      --surface:        rgba(255,255,255,0.04);
      --border:         rgba(255,255,255,0.08);

      /* ── Text ── */
      --text-color:     #ffffff;
      --text-dim:       rgba(255,255,255,0.55);
      --text-muted:     rgba(255,255,255,0.35);

      /* grid overlay */
      --grid-opacity:   0.017;
      /* icon color on tiles */
      --icon-color:     rgba(255,255,255,0.85);

      /* legacy aliases so existing CSS still works */
      --bg-base:        var(--app-bg);
      --text-base:      var(--text-color);
      --tile-default:   var(--tile-bg);
    }

    /* ── Global transition for smooth theme switching ── */
    *, *::before, *::after {
      box-sizing: border-box;
      transition:
        background-color 0.45s ease,
        background       0.45s ease,
        border-color     0.35s ease,
        color            0.3s ease,
        box-shadow       0.3s ease;
    }
    /* keep interactive transitions snappy */
    .tile        { transition: transform 0.25s ease, box-shadow 0.25s ease,
                               background-color 0.45s ease, border-color 0.35s ease !important; }
    .tile-menu-btn { transition: opacity 0.18s, background 0.18s !important; }
    .btn         { transition: background 0.2s, border-color 0.2s, color 0.2s, filter 0.2s !important; }
    .theme-card  { transition: border-color 0.2s, transform 0.18s !important; }

    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-color); overflow-x: hidden;
    }
    /* background-color is set directly via JS in applyTheme() */
    body {
      background-color: #080810;
    }
    /* Gradient overlay in pseudo-element — doesn't block bg-color transition */
    body::before {
      content: ''; position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% -5%, var(--bg-grad-a) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 100%, var(--bg-grad-b) 0%, transparent 60%);
    }
    /* Grid texture in a separate fixed layer */
    body::after {
      content: ''; position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,var(--grid-opacity)) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,var(--grid-opacity)) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    #app { position: relative; z-index: 1; padding-bottom: 140px; }

    /* ══ Light theme overrides ══ */
    .theme-light .tile { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .theme-light .tile:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,0.14), 0 0 0 1px var(--accent-border);
    }
    .theme-light #search-form {
      background: rgba(255,255,255,0.8);
      border-color: rgba(0,0,0,0.12);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .theme-light #search-form:focus-within {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 4px var(--accent-dim), 0 2px 12px rgba(0,0,0,0.07);
    }
    .theme-light #ai-dock {
      background: rgba(255,255,255,0.72);
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.9) inset;
    }
    .theme-light .dock-label {
      background: rgba(255,255,255,0.95);
      border-color: rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.8);
    }
    .theme-light #modal-box {
      background: #ffffff;
      border-color: rgba(0,0,0,0.1);
    }
    .theme-light .modal-input {
      background: #f8f9fa;
      border-color: rgba(0,0,0,0.12);
      color: #111827;
    }
    .theme-light .modal-input:focus { border-color: var(--accent-border); }
    .theme-light .tile-dropdown {
      background: #ffffff;
      border-color: rgba(0,0,0,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .theme-light .dd-item { color: rgba(0,0,0,0.65); }
    .theme-light .dd-item:hover { background: rgba(0,0,0,0.04); color: #111827; }
    .theme-light .dd-sep { background: rgba(0,0,0,0.07); }
    .theme-light .tile-menu-btn {
      background: rgba(255,255,255,0.8);
      border-color: rgba(0,0,0,0.12);
      color: rgba(0,0,0,0.5);
    }
    .theme-light .tile-menu-btn:hover { background: #fff; color: #111; }
    .theme-light #theme-panel {
      background: rgba(255,255,255,0.95);
      border-color: rgba(0,0,0,0.1);
    }
    .theme-light #theme-panel-title { color: rgba(0,0,0,0.45); }
    .theme-light .profile-btn { color: rgba(0,0,0,0.45); }
    .theme-light .profile-btn.active { color: #000; }
    .theme-light #profile-toggle {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.1);
    }
    .theme-light .section-title { color: rgba(0,0,0,0.5); }
    .theme-light .section-badge {
      background: rgba(0,0,0,0.06);
      color: rgba(0,0,0,0.4);
      border-color: rgba(0,0,0,0.1);
    }
    .theme-light .tile-add-placeholder {
      border-color: rgba(0,0,0,0.12);
      color: rgba(0,0,0,0.3);
    }
    .theme-light .tile-add-placeholder:hover {
      border-color: var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .theme-light body::after {
      background-image:
        linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
    }

    /* ══════════════════════════════════════════════════════
       CLOCK
    ══════════════════════════════════════════════════════ */
    #clock {
      font-family: 'DM Mono', monospace;
      font-size: clamp(36px, 4vw, 58px);
      font-weight: 500; letter-spacing: 0.05em; line-height: 1;
      color: var(--text-base);
    }

    /* ══════════════════════════════════════════════════════
       SEARCH
    ══════════════════════════════════════════════════════ */
    #search-wrap { max-width: 900px; width: 100%; margin: 0 auto 52px; }
    #search-form {
      display: flex; align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px; padding: 0 6px 0 18px;
    }
    #search-form:focus-within {
      border-color: var(--accent-border);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 4px var(--accent-dim);
    }
    #search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-base); font-family: 'DM Sans', sans-serif;
      font-size: 20px; padding: 18px 10px 18px 0; direction: rtl;
    }
    #search-input::placeholder { color: var(--text-muted); }
    #search-btn {
      background: var(--accent); border: none; cursor: pointer;
      color: #000; padding: 12px 26px; border-radius: 40px; font-size: 16px;
      display: flex; align-items: center; gap: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      flex-shrink: 0; transition: filter 0.2s !important;
    }
    #search-btn:hover { filter: brightness(1.12); }

    /* ══════════════════════════════════════════════════════
       WIDGET CARDS
    ══════════════════════════════════════════════════════ */
    .widget-card {
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface-card);
      padding: 16px 18px; position: relative; overflow: hidden;
    }
    .widget-card::after {
      content: ''; position: absolute; inset: 0; border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 55%);
      pointer-events: none;
    }
    .widget-label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    #weather-temp {
      font-family: 'DM Mono', monospace;
      font-size: 42px; font-weight: 500; line-height: 1; color: var(--text-base);
    }
    #weather-unit  { font-size: 22px; color: var(--text-muted); vertical-align: top; margin-top: 6px; display: inline-block; }
    #weather-desc  { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
    #weather-city  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    #weather-icon-wrap { font-size: 34px; line-height: 1; }
    #weather-error { font-size: 11px; color: rgba(255,100,100,0.7); display:none; margin-top:4px; line-height:1.4; }
    #weather-hint  { font-size: 11px; color: rgba(250,204,21,0.55); display:none; margin-top:6px; line-height:1.5; }
    .weather-row   { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .weather-extra { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
    .weather-pill  {
      background: rgba(255,255,255,0.05); border-radius: 8px;
      padding: 5px 8px; font-size: 11px; color: var(--text-dim);
      display: flex; align-items: center; gap: 5px;
    }

    /* News */
    #news-list { display: flex; flex-direction: column; }
    .news-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 6px; border-radius: 8px;
      border-bottom: 1px solid var(--border);
      text-decoration: none; cursor: pointer;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: var(--surface); }
    .news-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.6; flex-shrink: 0; }
    .news-headline {
      font-size: 12.5px; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .news-item:hover .news-headline { color: var(--text-base); }
    .news-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; font-family: 'DM Mono', monospace; }
    #news-error   { font-size: 12px; color: rgba(255,100,100,0.6); display:none; padding: 6px 0; }
    #news-refresh { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0; display: flex; align-items: center; }
    #news-refresh:hover { color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.8s linear infinite; }

    /* ══ Profile Toggle ══ */
    #profile-toggle {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
    }
    .profile-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 40px;
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease !important;
    }
    .profile-btn.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .profile-btn:not(.active):hover {
      color: var(--text-base);
      background: var(--surface);
    }
    /* slide animation for tiles on profile switch */
    @keyframes slideIn {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .tiles-switching .tile-wrap, .tiles-switching .tile-add-placeholder {
      animation: slideIn 0.35s ease both;
    }

    /* ══════════════════════════════════════════════════════
       BOOKS (ספריות)
    ══════════════════════════════════════════════════════ */
    #books-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 8px;
    }
    .book-wrap { position: relative; flex-shrink: 0; }
    .book {
      display: flex;
      width: 130px;
      height: 200px;
      text-decoration: none;
      cursor: pointer;
      border-radius: 3px 10px 10px 3px;
      overflow: hidden;
      position: relative;
      box-shadow: -4px 4px 10px rgba(0,0,0,0.4), -1px 0 3px rgba(0,0,0,0.3);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .book:hover {
      transform: translateX(6px) rotate(-1deg);
      box-shadow: -8px 8px 20px rgba(0,0,0,0.5), -2px 0 6px rgba(0,0,0,0.3);
    }
    /* Book spine */
    .book-spine {
      width: 18px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: vertical-rl;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
    }
    /* Book front */
    .book-front {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 12px;
      gap: 8px;
      background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, transparent 60%);
      position: relative;
    }
    .book-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--book-icon-bg, rgba(255,255,255,0.12));
      display: flex; align-items: center; justify-content: center;
    }
    .book-title {
      font-size: 13px; font-weight: 600;
      color: var(--book-text, rgba(255,255,255,0.92));
      line-height: 1.3;
      word-break: break-word;
      margin-top: auto;
    }
    .book-sub {
      font-size: 10px;
      color: var(--book-sub, rgba(255,255,255,0.38));
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    /* Add placeholder book */
    .book-add {
      width: 130px; height: 200px;
      border: 2px dashed var(--border);
      border-radius: 3px 10px 10px 3px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
      color: var(--text-muted); font-size: 12px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .book-add:hover {
      border-color: var(--accent-border);
      color: var(--accent);
      background: var(--accent-dim);
    }
    /* Book 3-dot menu */
    .book-menu-btn {
      position: absolute; top: 6px; left: 6px; z-index: 5;
      width: 26px; height: 26px; border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
      color: rgba(255,255,255,0.6); cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
      opacity: 0; transition: opacity 0.18s !important;
    }
    .book-wrap:hover .book-menu-btn, .book-menu-btn.menu-open { opacity: 1; }
    .book-menu-btn:hover { background: rgba(0,0,0,0.8); color: #fff; }

    /* ══════════════════════════════════════════════════════
       FILES (קבצים שימושיים)
    ══════════════════════════════════════════════════════ */
    #files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .file-wrap { position: relative; }
    .file {
      display: flex;
      flex-direction: column;
      text-decoration: none; cursor: pointer;
      border-radius: 6px 14px 14px 14px;
      border: 1px solid var(--border);
      background: var(--file-color, var(--tile-bg));
      padding: 20px 18px 16px;
      min-height: 120px;
      position: relative;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    /* Dog-ear fold on top-left corner */
    .file::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 22px; height: 22px;
      background: var(--app-bg);
      clip-path: polygon(0 0, 100% 0, 100% 100%);
      border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-radius: 0 6px 0 0;
    }
    .file:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.35), 0 0 0 1px var(--accent-border);
    }
    .file-icon {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: auto;
    }
    .file-title {
      font-size: 14px; font-weight: 500;
      color: var(--file-text, var(--text-base));
      margin-top: 12px;
      word-break: break-word;
      line-height: 1.3;
    }
    .file-sub {
      font-size: 11px; color: var(--file-sub, var(--text-muted));
      margin-top: 3px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    /* File add placeholder */
    .file-add {
      border-radius: 6px 14px 14px 14px;
      border: 2px dashed var(--border);
      min-height: 120px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px;
      cursor: pointer; color: var(--text-muted); font-size: 13px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .file-add:hover {
      border-color: var(--accent-border);
      color: var(--accent);
      background: var(--accent-dim);
    }
    /* File 3-dot menu */
    .file-menu-btn {
      position: absolute; top: 9px; left: 9px; z-index: 5;
      width: 28px; height: 28px; border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
      opacity: 0; transition: opacity 0.18s !important;
    }
    .file-wrap:hover .file-menu-btn, .file-menu-btn.menu-open { opacity: 1; }
    .file-menu-btn:hover { background: rgba(0,0,0,0.8); color: #fff; }

    /* shared dropdown (reuse .tile-dropdown style) */

    /* ══════════════════════════════════════════════════════
       TILES
    ══════════════════════════════════════════════════════ */
    #tiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 22px;
    }
    .tile-wrap { position: relative; }
    .tile {
      border-radius: 18px; border: 1px solid var(--border);
      background: var(--tile-color, #1a1a2e);
      cursor: pointer; text-decoration: none;
      display: flex; flex-direction: column;
      padding: 30px; min-height: 200px;
      position: relative; overflow: hidden;
    }
    .tile::after {
      content: ''; position: absolute; inset: 0; border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .tile:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--accent-border);
    }
    .tile-icon-wrap {
      width: 64px; height: 64px; border-radius: 18px;
      background: var(--icon-wrap-bg, rgba(255,255,255,0.1));
      display: flex; align-items: center; justify-content: center;
    }
    .tile-name { font-size: 20px; font-weight: 600; color: var(--text-color); margin-top: auto; padding-top: 16px; opacity: 0.9; }
    .tile-url  { font-size: 13px; color: var(--text-muted); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .tile-menu-btn {
      position: absolute; top: 12px; left: 12px; z-index: 5;
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
      color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
      opacity: 0;
    }
    .tile-wrap:hover .tile-menu-btn, .tile-menu-btn.menu-open { opacity: 1; }
    .tile-menu-btn:hover, .tile-menu-btn.menu-open { background: rgba(0,0,0,0.75); color: var(--text-base); }

    .tile-dropdown {
      position: absolute; top: 40px; left: 9px; z-index: 20;
      min-width: 145px; background: var(--bg-base);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 5px; box-shadow: 0 16px 48px rgba(0,0,0,0.65);
      display: none; flex-direction: column; gap: 2px;
    }
    .tile-dropdown.open { display: flex; animation: dropIn 0.17s ease both; }
    @keyframes dropIn {
      from { opacity:0; transform: translateY(-5px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .dd-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 12px; border-radius: 9px; border: none;
      background: transparent; color: var(--text-dim);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; width: 100%; text-align: right;
    }
    .dd-item:hover { background: var(--surface); color: var(--text-base); }
    .dd-item.danger:hover { background: rgba(239,68,68,0.13); color: #f87171; }
    .dd-sep { height: 1px; background: var(--border); margin: 3px 8px; }

    .tile-add-placeholder {
      border-radius: 18px; border: 1.5px dashed var(--border);
      min-height: 200px; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 8px;
      cursor: pointer; color: var(--text-muted); font-size: 16px;
    }
    .tile-add-placeholder:hover {
      border-color: var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* ══════════════════════════════════════════════════════
       SECTION BAR
    ══════════════════════════════════════════════════════ */
    .section-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
    .section-bar-left { display: flex; align-items: center; gap: 8px; }
    .section-accent { width: 4px; height: 26px; border-radius: 2px; background: var(--accent); }
    .section-title  { font-size: 16px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); }
    .section-badge  {
      background: var(--surface); color: var(--text-muted);
      font-size: 14px; padding: 3px 14px; border-radius: 99px; border: 1px solid var(--border);
    }

    /* ══════════════════════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════════════════════ */
    @keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.45s ease both; }
    @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:.2} }
    .pulse-dot { animation: pulseDot 2.2s ease-in-out infinite; }



    /* ══════════════════════════════════════════════════════
       THEME FAB (Floating Action Button — bottom-right)
    ══════════════════════════════════════════════════════ */
    #theme-fab {
      position: fixed; bottom: 110px; right: 28px; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); color: #000;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 3px var(--accent-dim);
      transition: transform 0.2s, filter 0.2s !important;
    }
    #theme-fab:hover { transform: scale(1.1) rotate(12deg); filter: brightness(1.1); }
    #theme-fab.open  { transform: scale(1.05) rotate(30deg); }

    /* ── Theme panel ── */
    #theme-panel {
      position: fixed; bottom: 178px; right: 28px; z-index: 199;
      width: 320px;
      background: #111118;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      display: none;
      flex-direction: column; gap: 10px;
      overflow-y: auto; max-height: 70vh;
    }
    #theme-panel.open {
      display: flex;
      animation: panelIn 0.2s ease both;
    }
    @keyframes panelIn {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }
    #theme-panel-title {
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 4px;
    }
    .theme-section-label {
      font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); padding: 4px 0 6px;
    }
    .theme-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .theme-sep {
      height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0;
    }
    .tc {
      /* theme card */
      border-radius: 12px; padding: 10px 11px;
      border: 2px solid rgba(255,255,255,0.07);
      cursor: pointer;
      display: flex; flex-direction: column; gap: 5px;
      background: #1a1a1a;
      font-family: 'DM Sans', sans-serif;
      text-align: right;
      transition: transform 0.15s ease, border-color 0.15s ease !important;
    }
    .tc:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2) !important; }
    .tc.tc-active { border-color: var(--accent) !important; }
    .tc-swatches { display: flex; gap: 3px; }
    .tc-swatch { width: 13px; height: 13px; border-radius: 3px; }
    .tc-name { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.85); margin-top: 3px; }
    .tc-sub  { font-size: 10px; color: rgba(255,255,255,0.35); }

    /* ══════════════════════════════════════════════════════
       MODAL
    ══════════════════════════════════════════════════════ */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px); z-index: 100;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: var(--bg-base); border: 1px solid var(--border);
      border-radius: 24px; width: 100%; max-width: 420px;
      padding: 28px; box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .modal-label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px; display: block;
    }
    .modal-input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 14px; color: var(--text-base); font-size: 14px;
      font-family: 'DM Sans', sans-serif; outline: none;
    }
    .modal-input:focus { border-color: var(--accent-border); }
    #icon-picker-dropdown {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 8px;
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 4px;
      max-height: 180px; overflow-y: auto;
    }
    #icon-search-input:focus { border-color: var(--accent-border) !important; }
    #icon-search-preview.valid { border-color: var(--accent-border) !important; }
    .icon-opt {
      padding: 8px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      background: transparent; border: none;
    }
    .icon-opt:hover { background: var(--surface); color: var(--text-base); }
    .icon-opt.selected { background: var(--accent-dim); color: var(--accent); }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 8px;
      border: 2px solid var(--border);
      cursor: pointer;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--accent) !important; }
    #tile-preview {
      width: 78px; height: 78px; border-radius: 18px;
      border: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
    }

    /* Profile selector inside modal */
    #profile-selector {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }
    .profile-sel-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease !important;
    }
    .profile-sel-btn:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text-base);
    }
    .profile-sel-btn.sel {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    .profile-sel-btn.sel-both {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }
    #preview-label {
      font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 500;
      max-width: 66px; text-align: center;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 9px 18px; border-radius: 12px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif; border: none; outline: none;
    }
    .btn-gold { background: var(--accent); color: #000; }
    .btn-gold:hover { filter: brightness(1.1); }
    .btn-ghost {
      background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
    }
    .btn-ghost:hover { color: var(--text-base); border-color: rgba(255,255,255,0.25); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    @media (max-width: 480px) {
      #tiles-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
      #theme-panel { right: 10px; left: 10px; width: auto; }
    }

    /* ══════════════════════════════════════════════════════
       AI DOCK
    ══════════════════════════════════════════════════════ */
    #ai-dock {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 180;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 28px;
      border-radius: 999px;
      background: rgba(10, 10, 20, 0.55);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }

    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
    }

    .dock-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.22s ease !important;
      position: relative;
      overflow: hidden;
    }

    .dock-item:hover .dock-icon {
      transform: scale(1.22) translateY(-6px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    /* Tooltip label */
    .dock-label {
      position: absolute;
      top: -34px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 20, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease !important;
      transform: translateX(-50%) translateY(4px);
      font-family: 'DM Sans', sans-serif;
    }

    .dock-item:hover .dock-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Separator */
    .dock-sep {
      width: 1px;
      height: 36px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1px;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      #ai-dock { gap: 10px; padding: 12px 18px; bottom: 16px; }
      .dock-icon { width: 44px; height: 44px; border-radius: 14px; }
    }
  </style>
</head>

const LIGHT_THEMES = new Set(['light','paper','slate','lavender']);

function applyTheme(id, save = true) {
  const theme = THEMES.find(t => t.id === id);
  if (!theme) return;
  activeThemeId = id;

  const root = document.documentElement;
  Object.entries(theme.vars).forEach(([key, val]) => root.style.setProperty(key, val));
  root.style.setProperty('--bg-base',      theme.vars['--app-bg']);
  root.style.setProperty('--text-base',    theme.vars['--text-color']);
  root.style.setProperty('--tile-default', theme.vars['--tile-bg']);
  root.style.setProperty('--icon-color',   theme.vars['--icon-color']   || 'rgba(255,255,255,0.85)');
  root.style.setProperty('--icon-wrap-bg', theme.vars['--icon-wrap-bg'] || 'rgba(255,255,255,0.1)');

  // Light/dark mode toggle
  const isLight = LIGHT_THEMES.has(id);
  document.documentElement.classList.toggle('theme-light', isLight);

  document.body.style.transition = 'background-color 0.5s ease';
  document.body.style.backgroundColor = theme.vars['--app-bg'];

  // Save: generic key + per-profile key
  if (save) {
    localStorage.setItem(THEME_STORAGE_KEY, id);
    localStorage.setItem('eran_theme_' + activeProfile, id);
  }
  renderThemeGrid();
  if (document.getElementById('tiles-grid')) {
    renderTiles();
    renderBooks();
    renderFiles();
  }
}

function loadTheme() {
  const saved = localStorage.getItem(THEME_STORAGE_KEY) || 'midnight';
  applyTheme(saved, false);
}

function toggleThemePanel() {
  themePanelOpen = !themePanelOpen;
  const panel = document.getElementById('theme-panel');
  const fab   = document.getElementById('theme-fab');
  if (themePanelOpen) {
    panel.classList.add('open');
    fab.classList.add('open');
    renderThemeGrid();
  } else {
    panel.classList.remove('open');
    fab.classList.remove('open');
  }
}

function renderThemeGrid() {
  const el = document.getElementById('theme-grid');
  const dark  = THEMES.filter(t => !LIGHT_THEMES.has(t.id));
  const light = THEMES.filter(t =>  LIGHT_THEMES.has(t.id));

  function card(t) {
    const active   = t.id === activeThemeId;
    const isLight  = LIGHT_THEMES.has(t.id);
    const nameclr  = isLight ? '#333' : 'rgba(255,255,255,0.88)';
    const subclr   = isLight ? '#777' : 'rgba(255,255,255,0.36)';
    const swatches = t.swatches.slice(0,4).map(sw =>
      '<span class="tc-swatch" style="background:' + sw + ';border:1px solid rgba(0,0,0,0.15);"></span>'
    ).join('');
    const check = active ? '<span style="position:absolute;top:6px;left:8px;font-size:13px;color:' + t.vars['--accent'] + ';">✓</span>' : '';
    const border = active ? t.vars['--accent'] : 'rgba(255,255,255,0.07)';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tc' + (active ? ' tc-active' : '');
    btn.style.cssText = 'background:' + t.swatches[0] + ';border-color:' + border + ';position:relative;width:100%;text-align:right;font-family:inherit;';
    btn.innerHTML = check + '<div class="tc-swatches">' + swatches + '</div>' +
      '<div class="tc-name" style="color:' + nameclr + '">' + t.name + '</div>' +
      '<div class="tc-sub" style="color:' + subclr + '">' + t.subtitle + '</div>';
    btn.addEventListener('click', function() { applyTheme(t.id); });
    return btn;
  }

  // Build DOM directly — avoids all quote-escaping issues with innerHTML
  el.innerHTML = '';

  function addSection(label, themes) {
    const lbl = document.createElement('div');
    lbl.className = 'theme-section-label';
    lbl.textContent = label;
    el.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'theme-row';
    themes.forEach(t => row.appendChild(card(t)));
    el.appendChild(row);
  }

  addSection('🌙 כהים', dark);

  const sep = document.createElement('div');
  sep.className = 'theme-sep';
  el.appendChild(sep);

  addSection('☀️ בהירים', light);
}

════════════════════════════════════════════════════ */
function profileKey(profile) {
  return 'eran_tiles_' + profile;   // eran_tiles_home | eran_tiles_work
}
function defaultTilesFor(profile) {
  return profile === 'work' ? [...DEFAULT_TILES_WORK] : [...DEFAULT_TILES_HOME];
}
function loadTiles(profile) {
  profile = profile || activeProfile;
  try {
    const raw = localStorage.getItem(profileKey(profile));
    tiles = raw ? JSON.parse(raw) : defaultTilesFor(profile);
  } catch { tiles = defaultTilesFor(profile); }
}
function saveTiles() {
  localStorage.setItem(profileKey(activeProfile), JSON.stringify(tiles));
}

   PROFILE SWITCHING
════════════════════════════════════════════════════ */
function switchProfile(profile) {
  if (profile === activeProfile) return;

  // Save current profile tiles before switching
  saveTiles();

  activeProfile = profile;
  localStorage.setItem('eran_active_profile', profile);

  // Update toggle buttons
  document.getElementById('btn-home').classList.toggle('active', profile === 'home');
  document.getElementById('btn-work').classList.toggle('active', profile === 'work');
  lucide.createIcons();

  // Update section title
  const titleEl = document.getElementById('section-title');
  if (titleEl) titleEl.textContent = 'קישורים מהירים — ' + (profile === 'home' ? 'בית' : 'עבודה');

  // Auto-switch theme: use profile's saved theme or the default for that profile
  const savedThemeKey = 'eran_theme_' + profile;
  const profileTheme  = localStorage.getItem(savedThemeKey) || PROFILE_DEFAULT_THEME[profile];
  applyTheme(profileTheme, false);   // don't save to generic key
  localStorage.setItem(savedThemeKey, profileTheme);

  // Load & render the profile's tiles with slide animation
  loadTiles(profile);
  loadBooks(); loadFiles();
  const grid = document.getElementById('tiles-grid');
  grid.classList.remove('tiles-switching');
  void grid.offsetWidth; // force reflow
  grid.classList.add('tiles-switching');
  renderTiles();
  renderBooks();
  renderFiles();
  setTimeout(() => grid.classList.remove('tiles-switching'), 600);
}

function loadActiveProfile() {
  activeProfile = localStorage.getItem('eran_active_profile') || 'home';
  // Sync toggle buttons
  document.getElementById('btn-home').classList.toggle('active', activeProfile === 'home');
  document.getElementById('btn-work').classList.toggle('active', activeProfile === 'work');
  const titleEl = document.getElementById('section-title');
  if (titleEl) titleEl.textContent = 'קישורים מהירים — ' + (activeProfile === 'home' ? 'בית' : 'עבודה');

const DAY_NAMES   = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MONTH_NAMES = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const pad = n => String(n).padStart(2,'0');

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('date-display').textContent =
    `יום ${DAY_NAMES[now.getDay()]}, ${now.getDate()} ${MONTH_NAMES[now.getMonth()]} ${now.getFullYear()}`;
  const h = now.getHours();
  let g = 'שלום', sub = 'ברוך הבא';
  if      (h >= 5  && h < 12) { g = 'בוקר טוב';      sub = 'יום טוב מתחיל';  }
  else if (h >= 12 && h < 17) { g = 'צהריים טובים';  sub = 'המשך יום נעים';  }
  else if (h >= 17 && h < 21) { g = 'ערב טוב';        sub = 'שעת הרפיה';      }
  else                         { g = 'לילה טוב';       sub = 'מנוחה נעימה';    }
  document.getElementById('greeting-text').textContent = g;
  document.getElementById('greeting-sub').textContent  = sub;
}

   TILES
════════════════════════════════════════════════════ */
function renderTiles() {
  const grid = document.getElementById('tiles-grid');
  document.getElementById('tile-count').textContent = tiles.length;
  grid.innerHTML = '';
  tiles.forEach((tile, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'tile-wrap fade-up';
    wrap.style.animationDelay = `${idx * 0.04}s`;
    wrap.innerHTML = buildTileHTML(tile, idx);
    grid.appendChild(wrap);
  });
  const ph = document.createElement('div');
  ph.className = 'tile-add-placeholder fade-up';
  ph.style.animationDelay = `${tiles.length * 0.04}s`;
  ph.onclick = () => openModal(null);
  ph.innerHTML = `<i data-lucide="plus" style="width:32px;height:32px;"></i><span>הוסף אריח</span>`;
  grid.appendChild(ph);
  lucide.createIcons();
}

function buildTileHTML(tile, index) {
  const clean = tile.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  const bg    = tile.color || tileDefaultColor(index);
  return `
    <button class="tile-menu-btn" id="menu-btn-${tile.id}" onclick="toggleMenu(event,${tile.id})" title="אפשרויות">
      <i data-lucide="more-vertical" style="width:18px;height:18px;"></i>
    </button>
    <div class="tile-dropdown" id="dropdown-${tile.id}">
      <button class="dd-item" onclick="closeMenu();openModal(${tile.id})">
        <i data-lucide="pencil" style="width:12px;height:12px;"></i>ערוך
      </button>
      <div class="dd-sep"></div>
      <button class="dd-item danger" onclick="closeMenu();deleteTile(${tile.id})">
        <i data-lucide="trash-2" style="width:12px;height:12px;"></i>מחק
      </button>
    </div>
    <a class="tile" style="--tile-color:${bg};" href="${escapeHTML(tile.url)}" target="_blank" rel="noopener noreferrer">
      <div class="tile-icon-wrap">
        <i data-lucide="${tile.icon}" style="width:34px;height:34px;color:var(--icon-color, rgba(255,255,255,0.85));"></i>
      </div>
      <div class="tile-name">${escapeHTML(tile.name)}</div>

    </a>`;
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  let t = document.getElementById('app-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'app-toast';
    t.style.cssText = [
      'position:fixed','bottom:120px','left:50%',
      'transform:translateX(-50%)','z-index:500',
      'background:rgba(10,10,20,0.92)','backdrop-filter:blur(12px)',
      'border:1px solid rgba(255,255,255,0.12)',
      'color:var(--accent)','font-family:DM Sans,sans-serif',
      'font-size:14px','font-weight:500',
      'padding:11px 22px','border-radius:50px',
      'box-shadow:0 8px 32px rgba(0,0,0,0.4)',
      'transition:opacity 0.3s ease,transform 0.3s ease',
      'pointer-events:none'
    ].join(';');
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(8px)';
  }, 2500);
}

/* Three-dot menu */
function toggleMenu(e, id) {
  e.preventDefault(); e.stopPropagation();
  if (openMenuId === id) { closeMenu(); return; }
  closeMenu(); openMenuId = id;
  document.getElementById(`dropdown-${id}`).classList.add('open');
  document.getElementById(`menu-btn-${id}`).classList.add('menu-open');
}
function closeMenu() {
  if (!openMenuId) return;
  document.getElementById(`dropdown-${openMenuId}`)?.classList.remove('open');
  document.getElementById(`menu-btn-${openMenuId}`)?.classList.remove('menu-open');
  openMenuId = null;
}
document.addEventListener('click', e => { if (!e.target.closest('.tile-wrap')) closeMenu(); });

function deleteTile(id) { tiles = tiles.filter(t => t.id !== id); saveTiles(); renderTiles(); }

/* Modal */
function openModal(id) {
  editingId = id;
  const isNew = id === null;
  document.getElementById('modal-title').textContent = isNew ? 'אריח חדש' : 'עריכת אריח';
  document.getElementById('modal-overlay').classList.add('open');

  // Show profile selector only for new tiles
  const pWrap = document.getElementById('profile-selector-wrap');
  pWrap.style.display = isNew ? 'block' : 'none';
  if (isNew) {
    profileSel = 'current';
    setProfileSel('current');
    // Update label to show current profile name
    const lbl = document.getElementById('psel-current-label');
    if (lbl) lbl.textContent = activeProfile === 'home' ? 'בית בלבד' : 'עבודה בלבד';
  }

  if (!isNew) {
    const t = tiles.find(t => t.id === id);
    document.getElementById('f-name').value = t.name;
    document.getElementById('f-url').value  = t.url;
    selectIcon(t.icon, false); selectColor(t.color || '');
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-url').value  = '';
    selectIcon('globe', false); selectColor('');
  }
  // reset icon search
  const isi = document.getElementById('icon-search-input');
  if (isi) { isi.value = ''; }
  const iss = document.getElementById('icon-search-status');
  if (iss) { iss.textContent = ''; }
  buildIconPicker(null); buildColorSwatches(); updatePreview();
  lucide.createIcons();
}

function setProfileSel(val) {
  profileSel = val;
  document.getElementById('psel-current').classList.toggle('sel', val === 'current');
  document.getElementById('psel-both').classList.toggle('sel', val === 'both');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('icon-picker-dropdown').classList.remove('open');
}
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
function saveTile() {
  const name = document.getElementById('f-name').value.trim();
  const url  = document.getElementById('f-url').value.trim();
  if (!name) { alert('אנא הכנס שם לאריח'); return; }
  if (!url)  { alert('אנא הכנס כתובת URL'); return; }

  if (editingId === null) {
    // New tile
    const newTile = { id: Date.now(), name, url, icon: selectedIcon, color: selectedColor };

    if (profileSel === 'both') {
      // Add to current profile
      tiles.push({ ...newTile });
      saveTiles();

      // Add to the OTHER profile with a different id
      const otherProfile = activeProfile === 'home' ? 'work' : 'home';
      const otherKey = profileKey(otherProfile);
      let otherTiles = [];
      try {
        const raw = localStorage.getItem(otherKey);
        otherTiles = raw ? JSON.parse(raw) : defaultTilesFor(otherProfile);
      } catch { otherTiles = defaultTilesFor(otherProfile); }
      otherTiles.push({ ...newTile, id: Date.now() + 1 });
      localStorage.setItem(otherKey, JSON.stringify(otherTiles));

      // Show confirmation
      const otherName = otherProfile === 'home' ? 'בית' : 'עבודה';
      showToast(`האריח נוסף לשני הפרופילים ✓`);
    } else {
      tiles.push(newTile);
      saveTiles();
    }
  } else {
    // Edit existing tile
    tiles = tiles.map(t => t.id === editingId
      ? { ...t, name, url, icon: selectedIcon, color: selectedColor }
      : t);
    saveTiles();
  }
  closeModal();
  renderTiles();
}

/* Icon picker */
const POPULAR_ICONS = [
  'globe','mail','github','youtube','twitter','linkedin','instagram','facebook',
  'play','search','home','star','heart','bookmark','bell','settings',
  'shield','briefcase','coffee','code','terminal','database','monitor','smartphone',
  'camera','music','map','cloud','zap','send','rss','book-open',
  'file-text','trash-2','edit-3','plus','check','x','arrow-right','external-link',
  'lock','unlock','user','users','calendar','clock','download','upload',
  'shopping-cart','credit-card','bar-chart','pie-chart','activity','layers',
];

function buildIconPicker(filter) {
  const dp   = document.getElementById('icon-picker-dropdown');
  const list = filter
    ? POPULAR_ICONS.filter(n => n.includes(filter.toLowerCase()))
    : POPULAR_ICONS;
  if (list.length === 0) {
    dp.innerHTML = `<div style="grid-column:1/-1;padding:12px;text-align:center;font-size:12px;color:var(--text-muted);">לא נמצאו אייקונים</div>`;
    return;
  }
  dp.innerHTML = list.map(n =>
    `<button class="icon-opt ${n===selectedIcon?'selected':''}" onclick="selectIcon('${n}')" title="${n}">
      <i data-lucide="${n}" style="width:15px;height:15px;"></i></button>`).join('');
  lucide.createIcons();
}

function onIconSearch(val) {
  const trimmed = val.trim().toLowerCase().replace(/\s+/g,'-');
  const status  = document.getElementById('icon-search-status');
  const prev    = document.getElementById('icon-search-preview');
  const prevIcon= document.getElementById('icon-search-preview-icon');

  // always update grid filter
  buildIconPicker(trimmed || null);

  if (!trimmed) {
    status.textContent = '';
    prev.classList.remove('valid');
    prevIcon.setAttribute('data-lucide', selectedIcon);
    lucide.createIcons({ nodes: [prevIcon] });
    return;
  }

  // Try rendering the exact icon name typed
  prevIcon.setAttribute('data-lucide', trimmed);
  lucide.createIcons({ nodes: [prevIcon] });

  // Check if lucide actually rendered it (replaces <i> with <svg>)
  const rendered = prev.querySelector('svg');
  if (rendered) {
    status.innerHTML = `<span style="color:var(--accent);">✓ אייקון נמצא — לחץ Enter לבחירה</span>`;
    prev.classList.add('valid');
  } else {
    status.textContent = 'לא נמצא אייקון בשם זה';
    prev.classList.remove('valid');
  }
}

function applyIconFromSearch() {
  const val = document.getElementById('icon-search-input').value.trim().toLowerCase().replace(/\s+/g,'-');
  if (!val) return;
  const prev = document.getElementById('icon-search-preview');
  if (prev.querySelector('svg')) {
    selectIcon(val);
    document.getElementById('icon-search-input').value = '';
    document.getElementById('icon-search-status').textContent = '';
    buildIconPicker(null);
  }
}

function selectIcon(name) {
  selectedIcon = name;
  document.querySelectorAll('.icon-opt').forEach(el => el.classList.toggle('selected', el.title === name));
  // sync search preview to selected icon
  const prevIcon = document.getElementById('icon-search-preview-icon');
  prevIcon.setAttribute('data-lucide', name);
  lucide.createIcons({ nodes: [prevIcon] });
  updatePreview();
}

/* Color picker */
function buildColorSwatches() {
  document.getElementById('color-swatches').innerHTML = COLOR_PRESETS.map(c =>
    `<button class="color-swatch ${c===selectedColor?'selected':''}" style="background:${c};" onclick="selectColor('${c}')"></button>`
  ).join('');
}
function selectColor(color) {
  selectedColor = color;
  if (color) {
    document.getElementById('f-color-custom').value = color;
    const rgb = `rgb(${parseInt(color.slice(1,3),16)}, ${parseInt(color.slice(3,5),16)}, ${parseInt(color.slice(5,7),16)})`;
    document.querySelectorAll('.color-swatch').forEach(el =>
      el.classList.toggle('selected', el.style.background === color || el.style.background === rgb));
    document.getElementById('btn-use-theme-color').style.opacity = '0.5';
  } else {
    // empty = use theme color
    document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
    document.getElementById('btn-use-theme-color').style.opacity = '1';
    document.getElementById('btn-use-theme-color').style.borderWidth = '2px';
  }
  updatePreview();
}
function updatePreview() {
  document.getElementById('preview-label').textContent = document.getElementById('f-name').value || 'שם';
  const previewBg = selectedColor ||
    getComputedStyle(document.documentElement).getPropertyValue('--tile-bg').trim();
  document.getElementById('tile-preview').style.background = previewBg;
  const pi = document.getElementById('preview-icon');
  pi.setAttribute('data-lucide', selectedIcon);
  lucide.createIcons({ nodes: [pi] });
}

/* ════════════════════════════════════════════════════
   BOOKS & FILES — data + render + modal
════════════════════════════════════════════════════ */
const BOOK_COLORS = ['#1a3a4a','#2d6a4f','#3d0000','#0f3460','#4a1942','#1b4332','#370617','#2c3e50'];
const FILE_COLORS = ['#1e293b','#1c1917','#1a1a2e','#0f3460','#1b4332','#2d3748','#292524','#1e1b4b'];

let books = [];
let files = [];
let itemEditType    = null;   // 'book' | 'file'
let itemEditId      = null;
let itemColor       = '';
let itemProfileSel  = 'current';  // 'current' | 'both'

function booksKey() { return 'eran_books_' + activeProfile; }
function filesKey() { return 'eran_files_' + activeProfile; }

function loadBooks() {
  try { books = JSON.parse(localStorage.getItem(booksKey()) || '[]'); }
  catch { books = []; }
}
function saveBooks() { localStorage.setItem(booksKey(), JSON.stringify(books)); }
function loadFiles() {
  try { files = JSON.parse(localStorage.getItem(filesKey()) || '[]'); }
  catch { files = []; }
}
function saveFiles() { localStorage.setItem(filesKey(), JSON.stringify(files)); }

/* ── Smart text color based on background luminance ── */
function getTextColorForBg(hex) {
  if (!hex || hex.length < 4) return { text: 'rgba(255,255,255,0.92)', sub: 'rgba(255,255,255,0.38)', icon: 'rgba(255,255,255,0.85)', iconBg: 'rgba(255,255,255,0.12)' };
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  if (lum > 0.55) {
    return { text: 'rgba(0,0,0,0.82)', sub: 'rgba(0,0,0,0.42)', icon: 'rgba(0,0,0,0.72)', iconBg: 'rgba(0,0,0,0.10)' };
  }
  return { text: 'rgba(255,255,255,0.92)', sub: 'rgba(255,255,255,0.38)', icon: 'rgba(255,255,255,0.85)', iconBg: 'rgba(255,255,255,0.12)' };
}

/* ── Render Books ── */
function renderBooks() {
  const grid  = document.getElementById('books-grid');
  const count = document.getElementById('book-count');
  if (!grid) return;
  count.textContent = books.length;
  grid.innerHTML = '';

  books.forEach((b, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'book-wrap fade-up';
    wrap.style.animationDelay = (idx * 0.04) + 's';

    // 3-dot button
    const btn = document.createElement('button');
    btn.className = 'book-menu-btn';
    btn.id = 'book-menu-' + b.id;
    btn.title = 'אפשרויות';
    btn.innerHTML = '<i data-lucide="more-vertical" style="width:13px;height:13px;"></i>';
    btn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); toggleItemMenu(e,'book',b.id); });

    // Dropdown
    const dd = document.createElement('div');
    dd.className = 'tile-dropdown';
    dd.id = 'book-dd-' + b.id;

    const editBtn = document.createElement('button');
    editBtn.className = 'dd-item';
    editBtn.innerHTML = '<i data-lucide="pencil" style="width:12px;height:12px;"></i>ערוך';
    editBtn.addEventListener('click', function() { closeItemMenu(); openItemModal('book', b.id); });

    const sep = document.createElement('div');
    sep.className = 'dd-sep';

    const delBtn = document.createElement('button');
    delBtn.className = 'dd-item danger';
    delBtn.innerHTML = '<i data-lucide="trash-2" style="width:12px;height:12px;"></i>מחק';
    delBtn.addEventListener('click', function() { closeItemMenu(); deleteItem('book', b.id); });

    dd.appendChild(editBtn);
    dd.appendChild(sep);
    dd.appendChild(delBtn);

    // Book link
    const a = document.createElement('a');
    // Use same rotating palette as tiles when no custom color set
    const bgColor = b.color || tileDefaultColor(idx);
    const tc = getTextColorForBg(bgColor);
    a.className = 'book';
    a.style.cssText = 'background:' + bgColor + ';--book-text:' + tc.text + ';--book-sub:' + tc.sub + ';--book-icon-bg:' + tc.iconBg;
    a.href = b.url || '#';
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    const shortUrl = (b.url || '').replace(/^.*[/\\]/, '').slice(0, 22);
    a.innerHTML = '<div class="book-spine"></div>'
      + '<div class="book-front">'
      + '<div class="book-icon"><i data-lucide="folder-open" style="width:18px;height:18px;color:' + tc.icon + ';"></i></div>'
      + '<div class="book-title">' + escapeHTML(b.name) + '</div>'

      + '</div>';

    wrap.appendChild(btn);
    wrap.appendChild(dd);
    wrap.appendChild(a);
    grid.appendChild(wrap);
  });

  const ph = document.createElement('div');
  ph.className = 'book-add fade-up';
  ph.style.animationDelay = (books.length * 0.04) + 's';
  ph.addEventListener('click', function() { openItemModal('book', null); });
  ph.innerHTML = '<i data-lucide="plus" style="width:24px;height:24px;"></i><span>הוסף</span>';
  grid.appendChild(ph);
  lucide.createIcons();
}

/* ── Render Files ── */
function renderFiles() {
  const grid  = document.getElementById('files-grid');
  const count = document.getElementById('file-count');
  if (!grid) return;
  count.textContent = files.length;
  grid.innerHTML = '';

  const iconMap = { pdf:'file-text', doc:'file-text', docx:'file-text',
                    xls:'bar-chart', xlsx:'bar-chart', ppt:'layers', pptx:'layers',
                    txt:'align-left', zip:'archive', rar:'archive',
                    jpg:'image', jpeg:'image', png:'image', gif:'image', mp4:'play' };

  files.forEach((f, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'file-wrap fade-up';
    wrap.style.animationDelay = (idx * 0.04) + 's';

    const btn = document.createElement('button');
    btn.className = 'file-menu-btn';
    btn.id = 'file-menu-' + f.id;
    btn.title = 'אפשרויות';
    btn.innerHTML = '<i data-lucide="more-vertical" style="width:13px;height:13px;"></i>';
    btn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); toggleItemMenu(e,'file',f.id); });

    const dd = document.createElement('div');
    dd.className = 'tile-dropdown';
    dd.id = 'file-dd-' + f.id;

    const editBtn = document.createElement('button');
    editBtn.className = 'dd-item';
    editBtn.innerHTML = '<i data-lucide="pencil" style="width:12px;height:12px;"></i>ערוך';
    editBtn.addEventListener('click', function() { closeItemMenu(); openItemModal('file', f.id); });

    const sep2 = document.createElement('div');
    sep2.className = 'dd-sep';

    const delBtn = document.createElement('button');
    delBtn.className = 'dd-item danger';
    delBtn.innerHTML = '<i data-lucide="trash-2" style="width:12px;height:12px;"></i>מחק';
    delBtn.addEventListener('click', function() { closeItemMenu(); deleteItem('file', f.id); });

    dd.appendChild(editBtn);
    dd.appendChild(sep2);
    dd.appendChild(delBtn);

    const fileBg = f.color || tileDefaultColor(idx);
    const ftc = getTextColorForBg(fileBg);
    const a = document.createElement('a');
    a.className = 'file';
    a.style.cssText = '--file-color:' + fileBg + ';--file-text:' + ftc.text + ';--file-sub:' + ftc.sub;
    a.href = f.url || '#';
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    const ext   = (f.url || '').split('.').pop().toLowerCase();
    const icon  = iconMap[ext] || 'file';
    const short = (f.url || '').replace(/^.*[/\\]/, '').slice(0, 28) || (f.url || '');
    a.innerHTML = '<div class="file-icon"><i data-lucide="' + icon + '" style="width:28px;height:28px;color:' + ftc.icon + ';"></i></div>'
      + '<div class="file-title">' + escapeHTML(f.name) + '</div>'
;

    wrap.appendChild(btn);
    wrap.appendChild(dd);
    wrap.appendChild(a);
    grid.appendChild(wrap);
  });

  const ph2 = document.createElement('div');
  ph2.className = 'file-add fade-up';
  ph2.style.animationDelay = (files.length * 0.04) + 's';
  ph2.addEventListener('click', function() { openItemModal('file', null); });
  ph2.innerHTML = '<i data-lucide="plus" style="width:22px;height:22px;"></i><span>הוסף</span>';
  grid.appendChild(ph2);
  lucide.createIcons();
}



/* ── Item 3-dot menu ── */
let openItemMenuType = null;
let openItemMenuId   = null;

function toggleItemMenu(e, type, id) {
  e.stopPropagation();
  const sameMenu = openItemMenuType === type && openItemMenuId === id;
  closeItemMenu();
  if (sameMenu) return;
  openItemMenuType = type; openItemMenuId = id;
  const dd  = document.getElementById(type + '-dd-' + id);
  const btn = document.getElementById(type + '-menu-' + id);
  if (dd)  dd.classList.add('open');
  if (btn) btn.classList.add('menu-open');
}
function closeItemMenu() {
  if (!openItemMenuType) return;
  const dd  = document.getElementById(openItemMenuType + '-dd-' + openItemMenuId);
  const btn = document.getElementById(openItemMenuType + '-menu-' + openItemMenuId);
  if (dd)  dd.classList.remove('open');
  if (btn) btn.classList.remove('menu-open');
  openItemMenuType = null; openItemMenuId = null;
}
document.addEventListener('click', () => closeItemMenu());

function deleteItem(type, id) {
  if (type === 'book') { books = books.filter(b => b.id !== id); saveBooks(); renderBooks(); }
  else                  { files = files.filter(f => f.id !== id); saveFiles(); renderFiles(); }
}

/* ── Item modal ── */
function openItemModal(type, id) {
  itemEditType = type;
  itemEditId   = id;
  const isNew  = id === null;
  const label  = type === 'book' ? 'ספרייה' : 'קובץ';
  document.getElementById('item-modal-title').textContent = isNew ? ('הוסף ' + label) : ('ערוך ' + label);
  document.getElementById('item-modal-overlay').style.display = 'flex';

  // Profile selector: only for new items
  const iWrap = document.getElementById('item-profile-selector-wrap');
  iWrap.style.display = isNew ? 'block' : 'none';
  if (isNew) {
    itemProfileSel = 'current';
    document.getElementById('ipsel-current').classList.add('sel');
    document.getElementById('ipsel-both').classList.remove('sel');
    const lbl = document.getElementById('ipsel-current-label');
    if (lbl) lbl.textContent = activeProfile === 'home' ? 'בית בלבד' : 'עבודה בלבד';
    // wire up buttons
    document.getElementById('ipsel-current').onclick = function() {
      itemProfileSel = 'current';
      this.classList.add('sel');
      document.getElementById('ipsel-both').classList.remove('sel');
    };
    document.getElementById('ipsel-both').onclick = function() {
      itemProfileSel = 'both';
      this.classList.add('sel');
      document.getElementById('ipsel-current').classList.remove('sel');
    };
  }

  const colors = type === 'book' ? BOOK_COLORS : FILE_COLORS;
  const existing = isNew ? null : (type === 'book' ? books : files).find(x => x.id === id);

  document.getElementById('item-f-name').value = existing ? existing.name : '';
  document.getElementById('item-f-url').value  = existing ? existing.url  : '';
  itemColor = existing ? (existing.color || '') : '';

  // Color swatches
  const sw = document.getElementById('item-color-swatches');
  sw.innerHTML = '';
  colors.forEach(col => {
    const b2 = document.createElement('button');
    b2.className = 'ic-sw color-swatch' + (col === itemColor ? ' selected' : '');
    b2.style.cssText = 'background:' + col + ';' + (col === itemColor ? 'outline:2px solid var(--accent);outline-offset:2px;' : '');
    b2.addEventListener('click', function() {
      itemColor = col;
      sw.querySelectorAll('.ic-sw').forEach(x => { x.style.outline = ''; x.classList.remove('selected'); });
      b2.style.outline = '2px solid var(--accent)';
      b2.style.outlineOffset = '2px';
      b2.classList.add('selected');
    });
    sw.appendChild(b2);
  });

  lucide.createIcons();
}

function closeItemModal() {
  document.getElementById('item-modal-overlay').style.display = 'none';
}

function saveItem() {
  const name = document.getElementById('item-f-name').value.trim();
  const url  = document.getElementById('item-f-url').value.trim();
  if (!name) { alert('אנא הכנס שם'); return; }

  const isNew = itemEditId === null;
  const item  = { id: itemEditId || Date.now(), name, url, color: itemColor };

  function saveToProfile(profileName, newItem) {
    const isBook = itemEditType === 'book';
    const key    = 'eran_' + (isBook ? 'books' : 'files') + '_' + profileName;
    let list = [];
    try { list = JSON.parse(localStorage.getItem(key) || '[]'); } catch { list = []; }
    if (isNew) { list.push({ ...newItem, id: Date.now() + Math.random() }); }
    else { list = list.map(x => x.id === itemEditId ? newItem : x); }
    localStorage.setItem(key, JSON.stringify(list));
  }

  if (itemEditType === 'book') {
    if (isNew) { books.push(item); }
    else { books = books.map(b => b.id === itemEditId ? item : b); }
    saveBooks();
    if (isNew && itemProfileSel === 'both') {
      const other = activeProfile === 'home' ? 'work' : 'home';
      saveToProfile(other, { ...item, id: Date.now() + 1 });
      showToast('הספרייה נוספה לשני הפרופילים ✓');
    }
    renderBooks();
  } else {
    if (isNew) { files.push(item); }
    else { files = files.map(f => f.id === itemEditId ? item : f); }
    saveFiles();
    if (isNew && itemProfileSel === 'both') {
      const other = activeProfile === 'home' ? 'work' : 'home';
      saveToProfile(other, { ...item, id: Date.now() + 1 });
      showToast('הקובץ נוסף לשני הפרופילים ✓');
    }
    renderFiles();
  }
  closeItemModal();
}

/* ════════════════════════════════════════════════════
   USER NAME
════════════════════════════════════════════════════ */
function setUserName(name, save) {
  if (!name || !name.trim()) return;
  const n = name.trim();
  const el = document.getElementById('user-name');
  const footer = document.getElementById('footer-name');
  const titleEl = document.getElementById('page-title');
  if (el) el.textContent = n;
  if (footer) footer.textContent = n;
  if (titleEl) titleEl.textContent = 'הדשבורד של ' + n;
  if (save !== false) localStorage.setItem('eran_user_name', n);
}

function editUserName() {
  const current = document.getElementById('user-name').textContent;
  // Create inline input replacing the name
  const el = document.getElementById('user-name');
  const input = document.createElement('input');
  input.value = current;
  input.dir = 'rtl';
  input.style.cssText = [
    'background:transparent',
    'border:none',
    'border-bottom:2px solid var(--accent)',
    'color:var(--accent)',
    'font-size:inherit',
    'font-weight:inherit',
    'font-family:inherit',
    'outline:none',
    'width:' + Math.max(80, current.length * 20) + 'px',
    'text-align:right',
    'padding:0 2px',
  ].join(';');

  el.replaceWith(input);
  input.focus();
  input.select();

  function done() {
    const newName = input.value.trim() || current;
    // Restore span
    const span = document.createElement('span');
    span.id = 'user-name';
    span.style.cssText = 'color:var(--accent);cursor:pointer;border-bottom:1px dashed transparent;transition:border-color 0.2s;';
    span.title = 'לחץ לעריכת השם';
    span.addEventListener('click', editUserName);
    span.addEventListener('mouseenter', function() { this.style.borderBottomColor = 'var(--accent)'; });
    span.addEventListener('mouseleave', function() { this.style.borderBottomColor = 'transparent'; });
    input.replaceWith(span);
    setUserName(newName, true);
    showToast('השם עודכן ל: ' + newName + ' ✓');
  }

  input.addEventListener('blur', done);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}
